name: Report

on:
  push:
    branches: [main]
  schedule:
    - cron: '0 3 * * *'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  test-and-report:
    name: Test and publish Allure report
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm
      - run: npm ci
      - run: cp .env.example .env
      - name: Run the full suite with Allure results
        id: tests
        run: npm run test:report
        continue-on-error: true
      - run: npm run allure:generate
      - uses: actions/upload-pages-artifact@v3
        with:
          path: allure-report
      - id: deploy
        uses: actions/deploy-pages@v5
      - name: Fail the run when the suite was red
        if: steps.tests.outcome == 'failure'
        run: |
          echo "::error::Test suite failed — see the published report at ${{ steps.deploy.outputs.page_url }}"
          exit 1
