name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  static-checks:
    name: Static checks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v7
        with:
          node-version-file: .nvmrc
          cache: npm
      - run: npm ci
      - run: npm run typecheck
      - run: npm run lint
      - run: npm run format:check

  unit-tests:
    name: Unit tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v7
        with:
          node-version-file: .nvmrc
          cache: npm
      - run: npm ci
      - run: npm run test:unit

  contract-tests:
    name: Contract tests (Pact)
    runs-on: ubuntu-latest
    needs: [static-checks, unit-tests]
    env:
      PACT_VERSION: ${{ github.sha }}
      PACT_BRANCH: ${{ github.head_ref || github.ref_name }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v7
        with:
          node-version-file: .nvmrc
          cache: npm
      - run: npm ci
      - run: cp .env.local.example .env.local

      - name: Generate the consumer pacts
        run: npm run test:pact

      - name: Start the broker and the dockerized platform
        run: |
          npm run pact:broker:up
          npm run docker:up

      - name: Wait for every service to report healthy
        uses: ./.github/actions/wait-for-platform

      - name: Publish the pacts to the broker
        run: npm run pact:publish

      - name: Verify every provider against the published pacts
        run: npm run pact:verify
        env:
          PACT_BROKER_URL: http://localhost:9292

      - name: Gate on can-i-deploy
        run: npm run pact:can-i-deploy

      - name: Tear down
        if: always()
        run: |
          npm run docker:down
          npm run pact:broker:down

  live-tests:
    name: Tests & coverage
    runs-on: ubuntu-latest
    needs: [static-checks, unit-tests]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v7
        with:
          node-version-file: .nvmrc
          cache: npm
      - run: npm ci
      - run: cp .env.example .env
      - name: Run the full suite with coverage
        run: npm run coverage
        env:
          HTTP_LOG_FILE: exchanges.jsonl

      - name: Summarise the HTTP exchanges
        if: failure()
        run: npm run diagnose:exchanges

      - name: Upload the exchange log
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: exchange-log-${{ github.run_attempt }}
          path: exchanges.jsonl
          if-no-files-found: warn
