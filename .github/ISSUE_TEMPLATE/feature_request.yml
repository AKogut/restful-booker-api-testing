name: Feature / task
description: Propose a new capability, test, or improvement
labels: ["type:feat"]
body:
  - type: textarea
    id: goal
    attributes:
      label: Goal
      description: What should exist and why.
    validations:
      required: true
  - type: textarea
    id: acceptance
    attributes:
      label: Acceptance criteria
      placeholder: |
        - [ ] ...
        - [ ] ...
    validations:
      required: true
  - type: input
    id: milestone
    attributes:
      label: Milestone
      placeholder: "M2: Services & Happy Path"
